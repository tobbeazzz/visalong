<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" fill="none" role="img" aria-label="Salong Vi">

  <!-- Top rule -->
  <line x1="40" y1="18" x2="280" y2="18" stroke="#C4A96A" stroke-width="0.75"/>

  <!-- Diamond glyph center -->
  <rect x="156" y="12" width="8" height="8" fill="#C4A96A" transform="rotate(45 160 16)"/>

  <!-- SALONG – wide tracking small caps -->
  <text
    x="160"
    y="42"
    text-anchor="middle"
    font-family="'Jost', 'Helvetica Neue', sans-serif"
    font-weight="200"
    font-size="9"
    letter-spacing="8"
    fill="#9A948E"
    text-decoration="none"
  >SALONG</text>

  <!-- Vi – large italic serif -->
  <text
    x="160"
    y="88"
    text-anchor="middle"
    font-family="'Cormorant Garamond', 'Times New Roman', Georgia, serif"
    font-weight="300"
    font-style="italic"
    font-size="64"
    fill="#161412"
    letter-spacing="-1"
  >Vi</text>

  <!-- Bottom rule -->
  <line x1="40" y1="98" x2="280" y2="98" stroke="#C4A96A" stroke-width="0.75"/>

  <!-- STENUNGSUND – location tag -->
  <text
    x="160"
    y="114"
    text-anchor="middle"
    font-family="'Jost', 'Helvetica Neue', sans-serif"
    font-weight="200"
    font-size="7"
    letter-spacing="5"
    fill="#D4CEC8"
  >STENUNGSUND</text>

</svg>
