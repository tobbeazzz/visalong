<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 56" fill="none" role="img" aria-label="Salong Vi">

  <!-- Left vertical rule -->
  <line x1="28" y1="8" x2="28" y2="48" stroke="#C4A96A" stroke-width="0.75"/>

  <!-- SALONG stacked label -->
  <text
    x="40"
    y="24"
    font-family="'Jost', 'Helvetica Neue', sans-serif"
    font-weight="200"
    font-size="7.5"
    letter-spacing="5"
    fill="#9A948E"
  >SALONG</text>

  <!-- Diamond separator -->
  <rect x="118" y="26" width="6" height="6" fill="#C4A96A" transform="rotate(45 121 29)"/>

  <!-- ATELIER sub-label -->
  <text
    x="40"
    y="40"
    font-family="'Jost', 'Helvetica Neue', sans-serif"
    font-weight="200"
    font-size="6.5"
    letter-spacing="4.5"
    fill="#D4CEC8"
  >ATELIER</text>

  <!-- Thin divider -->
  <line x1="138" y1="12" x2="138" y2="44" stroke="#EDE9E4" stroke-width="0.75"/>

  <!-- Vi – italic serif -->
  <text
    x="156"
    y="44"
    font-family="'Cormorant Garamond', 'Times New Roman', Georgia, serif"
    font-weight="300"
    font-style="italic"
    font-size="44"
    fill="#161412"
    letter-spacing="-0.5"
  >Vi</text>

</svg>
